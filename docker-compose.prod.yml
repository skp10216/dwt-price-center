# 프로덕션 오버라이드 — docker-compose.yml과 함께 사용
# 로컬 빌드: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# CI 배포:   docker compose -f docker-compose.yml -f docker-compose.prod.yml pull && ... up -d

services:
  postgres:
    # 외부 포트 노출 제거 (보안)
    ports: !override []
    mem_limit: 512m
    memswap_limit: 768m
    cpus: 0.5

  redis:
    # 외부 포트 노출 제거 (보안)
    ports: !override []
    mem_limit: 128m
    memswap_limit: 192m
    cpus: 0.25

  backend:
    image: ghcr.io/skp10216/dwt-price-center-backend:${IMAGE_TAG:-latest}
    # 소스 마운트 제거, reload 제거
    volumes:
      - upload_files:/app/uploads
    ports: !override
      - "127.0.0.1:8100:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dwt_user}:${POSTGRES_PASSWORD:-dwt_password}@postgres:5432/${POSTGRES_DB:-dwt_price_center}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - CORS_ORIGINS=${CORS_ORIGINS:-https://settlement.dwt.kr}
      - USER_DOMAIN=${USER_DOMAIN:-dwt.kr}
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-admin.dwt.kr}
      - SETTLEMENT_DOMAIN=${SETTLEMENT_DOMAIN:-settlement.dwt.kr}
    mem_limit: 768m
    memswap_limit: 1024m
    cpus: 0.75
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    image: ghcr.io/skp10216/dwt-price-center-worker:${IMAGE_TAG:-latest}
    # 소스 마운트 제거
    volumes:
      - upload_files:/app/uploads
    mem_limit: 512m
    memswap_limit: 768m
    cpus: 0.5

  adminer:
    # 외부 포트 노출 제거 (보안)
    ports: !override
      - "127.0.0.1:8180:8080"
    mem_limit: 128m
    memswap_limit: 192m
    cpus: 0.25

  frontend:
    image: ghcr.io/skp10216/dwt-price-center-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://settlement.dwt.kr}
        - NEXT_PUBLIC_USER_DOMAIN=${NEXT_PUBLIC_USER_DOMAIN:-dwt.kr}
        - NEXT_PUBLIC_ADMIN_DOMAIN=${NEXT_PUBLIC_ADMIN_DOMAIN:-admin.dwt.kr}
        - NEXT_PUBLIC_SETTLEMENT_DOMAIN=${NEXT_PUBLIC_SETTLEMENT_DOMAIN:-settlement.dwt.kr}
        - NEXT_PUBLIC_USER_URL=${NEXT_PUBLIC_USER_URL:-https://dwt.kr}
        - NEXT_PUBLIC_ADMIN_URL=${NEXT_PUBLIC_ADMIN_URL:-https://admin.dwt.kr}
        - NEXT_PUBLIC_SETTLEMENT_URL=${NEXT_PUBLIC_SETTLEMENT_URL:-https://settlement.dwt.kr}
    volumes: !override []
    ports: !override
      - "127.0.0.1:3100:3100"
    environment:
      - NODE_ENV=production
    command: node server.js
    mem_limit: 512m
    memswap_limit: 768m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
