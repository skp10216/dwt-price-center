name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/skp10216/dwt-price-center-backend
  FRONTEND_IMAGE: ghcr.io/skp10216/dwt-price-center-frontend
  WORKER_IMAGE: ghcr.io/skp10216/dwt-price-center-worker

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: worker
            context: ./worker
            dockerfile: ./worker/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository }}-${{ matrix.service }}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://settlement.dwt.kr
            NEXT_PUBLIC_USER_DOMAIN=dwt.kr
            NEXT_PUBLIC_ADMIN_DOMAIN=admin.dwt.kr
            NEXT_PUBLIC_SETTLEMENT_DOMAIN=settlement.dwt.kr
            NEXT_PUBLIC_USER_URL=https://dwt.kr
            NEXT_PUBLIC_ADMIN_URL=https://admin.dwt.kr
            NEXT_PUBLIC_SETTLEMENT_URL=https://settlement.dwt.kr
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/dwt-price-center
            ./deploy.sh --ci
